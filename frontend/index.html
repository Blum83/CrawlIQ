<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrawlIQ — AI Website Auditor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c3aed'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='20'>🔍</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 900px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input[type="url"] {
      flex: 1;
      background: #0f0f13;
      border: 1px solid #2d2d3d;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus { border-color: #7c3aed; }

    button {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 16px;
      min-height: 20px;
    }

    .progress-bar-wrap {
      background: #0f0f13;
      border-radius: 8px;
      height: 6px;
      margin-bottom: 24px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      border-radius: 8px;
      width: 0%;
      transition: width 0.4s;
    }

    /* Report */
    #report { display: none; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: #0f0f13;
      border: 1px solid #2d2d3d;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-box .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #7c3aed;
    }

    .stat-box .label {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 4px;
    }

    .stat-box.warn .value { color: #f59e0b; }
    .stat-box.ok .value { color: #22c55e; }

    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; color: #a78bfa; }

    .issue-list {
      list-style: none;
      margin-bottom: 24px;
    }

    .issue-item {
      background: #0f0f13;
      border-left: 3px solid #f59e0b;
      border-radius: 0 8px 8px 0;
      margin-bottom: 8px;
      font-size: 0.9rem;
      overflow: hidden;
    }

    .issue-item.ok { border-left-color: #22c55e; }
    .issue-item.critical { border-left-color: #ef4444; }

    .issue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
    }

    .issue-header:hover { background: #16161f; }

    .issue-toggle {
      font-size: 0.75rem;
      color: #64748b;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .issue-urls {
      display: none;
      padding: 0 14px 10px 14px;
      border-top: 1px solid #2d2d3d;
    }

    .issue-urls.open { display: block; }

    .issue-url-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #1a1a24;
      font-size: 0.8rem;
    }

    .issue-url-item:last-child { border-bottom: none; }

    .issue-url-item a {
      color: #7c3aed;
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .issue-url-item a:hover { text-decoration: underline; }

    .ai-summary {
      background: #0f0f13;
      border: 1px solid #2d2d3d;
      border-radius: 10px;
      padding: 20px;
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      margin-bottom: 24px;
    }

    details summary {
      cursor: pointer;
      color: #7c3aed;
      font-size: 0.9rem;
      margin-bottom: 8px;
      user-select: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    th {
      text-align: left;
      color: #64748b;
      padding: 6px 8px;
      border-bottom: 1px solid #2d2d3d;
    }

    td {
      padding: 6px 8px;
      border-bottom: 1px solid #1a1a24;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tr:hover td { background: #16161f; }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
    }

    .badge-red { background: #7f1d1d; color: #fca5a5; }
    .badge-green { background: #14532d; color: #86efac; }
    .badge-yellow { background: #78350f; color: #fcd34d; }
    .badge-blue { background: #1e3a5f; color: #93c5fd; }

    /* Export buttons */
    #exportBtns {
      display: none;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .export-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
      background: #1e2130;
      border: 1px solid #2d2d3d;
      color: #e2e8f0;
    }

    .export-btn:hover { opacity: 0.8; }
    .export-btn.html { border-color: #7c3aed; color: #a78bfa; }
    .export-btn.excel { border-color: #22c55e; color: #86efac; }
    .export-btn.csv { border-color: #3b82f6; color: #93c5fd; }

    /* Advanced options */
    .advanced-toggle {
      font-size: 0.82rem;
      color: #64748b;
      cursor: pointer;
      user-select: none;
      margin-bottom: 16px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .advanced-toggle:hover { color: #a78bfa; }

    .advanced-panel {
      display: none;
      margin-bottom: 20px;
      padding: 16px;
      background: #0f0f13;
      border: 1px solid #2d2d3d;
      border-radius: 10px;
    }

    .advanced-panel.open { display: block; }

    .advanced-panel label {
      display: block;
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 6px;
    }

    .advanced-panel textarea {
      width: 100%;
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e2e8f0;
      font-size: 0.82rem;
      font-family: monospace;
      resize: vertical;
      min-height: 80px;
      outline: none;
      line-height: 1.6;
    }

    .advanced-panel textarea:focus { border-color: #7c3aed; }

    .advanced-panel .hint {
      font-size: 0.75rem;
      color: #475569;
      margin-top: 6px;
    }

    /* Technical setup block */
    .tech-setup {
      background: #0f0f13;
      border: 1px solid #2d2d3d;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 0.88rem;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .tech-setup-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tech-ok { color: #22c55e; font-weight: 700; }
    .tech-bad { color: #ef4444; font-weight: 700; }
    .tech-label { color: #94a3b8; }
    .tech-detail { color: #64748b; font-size: 0.8rem; }

    /* Table filter row */
    .table-filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .table-filter-row input[type="text"] {
      flex: 1;
      min-width: 180px;
      background: #0f0f13;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .table-filter-row input[type="text"]:focus { border-color: #7c3aed; }

    .table-filter-row select {
      background: #0f0f13;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }

    .table-filter-row select:focus { border-color: #7c3aed; }

    /* Mobile fixes */
    @media (max-width: 500px) {
      .card { padding: 20px 16px; }

      .input-row {
        flex-direction: column;
        gap: 8px;
      }

      .input-row button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>CrawlIQ</h1>
  <p class="subtitle">AI-powered website audit — SEO, accessibility, performance</p>

  <div class="card">
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://example.com" />
      <button id="analyzeBtn" onclick="startAnalysis()">Analyze</button>
    </div>

    <span class="advanced-toggle" onclick="toggleAdvanced()">
      <span id="advToggleArrow">&#9658;</span> Advanced options
    </span>
    <div class="advanced-panel" id="advancedPanel">
      <label>Exclude URL paths (one per line)</label>
      <textarea id="excludePatterns" placeholder="/tag/&#10;/page/&#10;/author/&#10;/category/"></textarea>
      <div class="hint">Any URL whose path contains one of these strings will be skipped during crawl.</div>
    </div>

    <div id="status"></div>
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="exportBtns">
      <a id="exportHtml" class="export-btn html" href="#" download>&#8595; HTML Report</a>
      <a id="exportExcel" class="export-btn excel" href="#" download>&#8595; Excel</a>
      <a id="exportCsv" class="export-btn csv" href="#" download>&#8595; CSV</a>
    </div>

    <div id="report"></div>
  </div>

  <script>
    let pollInterval = null;

    function toggleAdvanced() {
      const panel = document.getElementById('advancedPanel');
      const arrow = document.getElementById('advToggleArrow');
      const open = panel.classList.toggle('open');
      arrow.textContent = open ? '\u25BC' : '\u25BA';
    }

    async function startAnalysis() {
      let url = document.getElementById('urlInput').value.trim();
      if (!url) return alert('Enter a URL');
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      document.getElementById('urlInput').value = url;

      const rawPatterns = document.getElementById('excludePatterns').value;
      const exclude_patterns = rawPatterns.split('\n').map(s => s.trim()).filter(Boolean);

      document.getElementById('analyzeBtn').disabled = true;
      document.getElementById('report').style.display = 'none';
      setStatus('Starting analysis...');
      showProgress(true);

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({url, max_pages: 600, exclude_patterns}),
        });
        const job = await res.json();
        if (!res.ok) throw new Error(job.detail || 'Failed to start');
        pollStatus(job.job_id);
      } catch (e) {
        setStatus('Error: ' + e.message);
        document.getElementById('analyzeBtn').disabled = false;
        showProgress(false);
      }
    }

    function pollStatus(jobId) {
      let dots = 0;
      pollInterval = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${jobId}`);
          const job = await res.json();

          dots = (dots + 1) % 4;
          const dot = '.'.repeat(dots + 1);

          if (job.status === 'running') {
            const crawled = job.progress || 0;
            const total = job.total || 0;
            const p = crawled > 0 ? Math.min(crawled / (total || crawled) * 100, 95) : 10;
            document.getElementById('progressBar').style.width = p + '%';
            setStatus(crawled > 0 ? `Crawling${dot} ${crawled} pages` : `Crawling${dot}`);
          } else if (job.status === 'done') {
            clearInterval(pollInterval);
            document.getElementById('progressBar').style.width = '100%';
            setStatus('Analysis complete!');
            setTimeout(() => showProgress(false), 600);
            renderReport(job.result);
            showExportButtons(jobId);
            document.getElementById('analyzeBtn').disabled = false;
          } else if (job.status === 'error') {
            clearInterval(pollInterval);
            setStatus('Error: ' + job.error);
            showProgress(false);
            document.getElementById('analyzeBtn').disabled = false;
          } else {
            setStatus(`Status: ${job.status}${dot}`);
          }
        } catch (e) {
          setStatus('Polling error: ' + e.message);
        }
      }, 1500);
    }

    function makeUrlList(urls) {
      if (!urls || urls.length === 0) return '';
      const shown = urls.slice(0, 10);
      const remaining = urls.length - shown.length;
      const items = shown.map(u => {
        const display = typeof u === 'object' ? (u.url || u.redirect_to || JSON.stringify(u)) : u;
        const actualUrl = typeof u === 'object' ? (u.url || display) : u;
        const badge = u?.status ? `<span class="badge badge-red">${u.status}</span>` : '';
        const extra = u?.canonical ? ` <span style="color:#888;font-size:0.82em">&#8594; ${u.canonical}</span>` : '';
        const redir = u?.redirect_to ? ` <span style="color:#888;font-size:0.82em">&#8594; ${u.redirect_to}</span>` : '';
        return `<div class="issue-url-item">${badge}<a href="${actualUrl}" target="_blank" title="${actualUrl}">${actualUrl}</a>${extra}${redir}</div>`;
      }).join('');
      const moreHint = remaining > 0
        ? `<div style="color:#64748b;font-size:0.78rem;padding:4px 0">...and ${remaining} more</div>`
        : '';
      return items + moreHint;
    }

    function issueBlock(id, label, cls, count, urlList) {
      const hasUrls = urlList && urlList.length > 0;
      const toggleHint = hasUrls ? `<span class="issue-toggle">&#9660; show ${urlList.length} URLs</span>` : '';
      const urlsHtml = hasUrls
        ? `<div class="issue-urls" id="urls-${id}">${makeUrlList(urlList)}</div>`
        : '';
      return `
        <li class="issue-item ${cls}">
          <div class="issue-header" onclick="toggleUrls('${id}', this)">
            <span>${label}</span>${toggleHint}
          </div>
          ${urlsHtml}
        </li>`;
    }

    function toggleUrls(id, header) {
      const el = document.getElementById('urls-' + id);
      if (!el) return;
      const open = el.classList.toggle('open');
      const toggle = header.querySelector('.issue-toggle');
      if (toggle) {
        const count = el.querySelectorAll('.issue-url-item').length;
        toggle.textContent = open ? '\u25B2 hide' : `\u25BC show ${count} URLs`;
      }
    }

    function showExportButtons(jobId) {
      document.getElementById('exportBtns').style.display = 'flex';
      document.getElementById('exportHtml').href = `/api/export/${jobId}/html`;
      document.getElementById('exportExcel').href = `/api/export/${jobId}/excel`;
      document.getElementById('exportCsv').href = `/api/export/${jobId}/csv`;
    }

    // ── Score calculation ──────────────────────────────────────────────────────

    function calcScore(data) {
      const issues = data.issues || {};
      function cnt(key) { return issues[key]?.count || 0; }

      let score = 100;

      // missing_title: -15 per page, cap -20
      score -= Math.min(cnt('missing_title') * 15, 20);
      // missing_meta_description: -2 per page, cap -15
      score -= Math.min(cnt('missing_meta_description') * 2, 15);
      // missing_h1: -3 per page, cap -15
      score -= Math.min(cnt('missing_h1') * 3, 15);
      // multiple_h1: -1 per page, cap -5
      score -= Math.min(cnt('multiple_h1') * 1, 5);
      // missing_canonical: -1 per page, cap -10
      score -= Math.min(cnt('missing_canonical') * 1, 10);
      // duplicate_titles: -2 per page, cap -10
      score -= Math.min(cnt('duplicate_titles') * 2, 10);
      // missing_html_lang: -10 if any
      if (cnt('missing_html_lang') > 0) score -= 10;
      // non_200_status: -5 per page, cap -15
      score -= Math.min(cnt('non_200_status') * 5, 15);
      // slow_pages: -2 per page, cap -10
      score -= Math.min(cnt('slow_pages') * 2, 10);
      // js_dependent_pages: -3 per page, cap -10
      score -= Math.min(cnt('js_dependent_pages') * 3, 10);
      // missing_og: -1 per page, cap -10
      score -= Math.min(cnt('missing_og') * 1, 10);

      return Math.max(0, score);
    }

    // ── Table filtering ────────────────────────────────────────────────────────

    function applyTableFilters() {
      const search = (document.getElementById('tableSearch')?.value || '').toLowerCase();
      const filter = document.getElementById('tableFilter')?.value || '';
      const rows = document.querySelectorAll('#pageDetailsBody tr');
      rows.forEach(row => {
        const url = (row.dataset.url || '').toLowerCase();
        const matchSearch = !search || url.includes(search);
        let matchFilter = true;
        if (filter) {
          switch (filter) {
            case 'indexable':     matchFilter = row.dataset.indexable === 'true'; break;
            case 'not-indexable': matchFilter = row.dataset.indexable === 'false'; break;
            case 'no-title':      matchFilter = row.dataset.hasTitle === 'false'; break;
            case 'no-meta':       matchFilter = row.dataset.hasMeta === 'false'; break;
            case 'no-h1':         matchFilter = row.dataset.hasH1 === 'false'; break;
            case 'slow':          matchFilter = row.dataset.slow === 'true'; break;
            case 'js-dependent':  matchFilter = row.dataset.jsDep === 'true'; break;
            case 'redirect':      matchFilter = row.dataset.redirect === 'true'; break;
          }
        }
        row.style.display = (matchSearch && matchFilter) ? '' : 'none';
      });
    }

    // ── Main render ───────────────────────────────────────────────────────────

    function renderReport(data) {
      const issues = data.issues || {};
      const cov = data.content_coverage || {};
      const idx = data.indexability || {};
      const perf = data.performance || {};
      const meta = data.meta_files || {};

      // SEO
      const missingTitle  = issues.missing_title?.count || 0;
      const missingMeta   = issues.missing_meta_description?.count || 0;
      const missingH1     = issues.missing_h1?.count || 0;
      const multipleH1    = issues.multiple_h1?.count || 0;
      const missingCanon  = issues.missing_canonical?.count || 0;
      const dupTitles     = issues.duplicate_titles?.count || 0;
      // Title/meta quality
      const titleTooLong   = issues.title_too_long?.count || 0;
      const titleTooShort  = issues.title_too_short?.count || 0;
      const metaTooLong    = issues.meta_description_too_long?.count || 0;
      const metaTooShort   = issues.meta_description_too_short?.count || 0;
      const dupMeta        = issues.duplicate_meta_descriptions?.count || 0;
      // Accessibility
      const missingLang   = issues.missing_html_lang?.count || 0;
      const missingAlt    = issues.missing_alt_tags?.count || 0;
      const missingBtn    = issues.buttons_missing_label?.count || 0;
      // Content
      const thinContent   = issues.thin_content_under_200_words?.count || 0;
      const emptyPages    = issues.empty_pages?.count || 0;
      // Technical
      const brokenImg     = issues.broken_images?.count || 0;
      const non200        = issues.non_200_status?.count || 0;
      // Indexability
      const noindexCount  = idx.noindex?.count || 0;
      const canonAwayCount = idx.canonicalized_away?.count || 0;
      // Performance
      const slowPgs       = issues.slow_pages?.count || 0;
      const jsDep         = issues.js_dependent_pages?.count || 0;
      const redirectPgs   = issues.redirect_pages?.count || 0;
      const deepPgs       = issues.deep_pages?.count || 0;
      const avgLoad       = perf.avg_load_time_ms || 0;
      // OG & Schema
      const missingOg     = issues.missing_og?.count || 0;
      const missingSchema = issues.missing_schema?.count || 0;
      // URL quality
      const urlIssues     = issues.url_issues?.count || 0;

      const totalIssues = missingTitle + missingMeta + missingH1 + multipleH1 + missingCanon + dupTitles
                        + missingLang + missingAlt + missingBtn
                        + thinContent + emptyPages + brokenImg + non200;

      const score = calcScore(data);
      const scoreCls = score >= 80 ? 'ok' : score >= 60 ? 'warn' : '';

      // Build page detail rows
      const pageRows = (data.page_details || []).map(p => {
        const indexBadge = p.indexable
          ? '<span class="badge badge-green">Yes</span>'
          : '<span class="badge badge-red">No</span>';
        const ogBadge = p.has_og_title && p.has_og_image
          ? '<span class="badge badge-green">Yes</span>'
          : '<span class="badge badge-red">No</span>';
        const schemaBadge = p.has_schema_org
          ? '<span class="badge badge-green">Yes</span>'
          : '<span class="badge badge-yellow">No</span>';
        const redirectBadge = p.is_redirect
          ? '<span class="badge badge-yellow">Yes</span>'
          : '';
        const loadDisplay = p.load_time_ms > 3000
          ? `<span class="badge badge-red">${p.load_time_ms}</span>`
          : p.load_time_ms > 0 ? p.load_time_ms : '-';
        return `
          <tr
            data-url="${p.url}"
            data-indexable="${p.indexable}"
            data-has-title="${p.has_title}"
            data-has-meta="${p.has_meta_description}"
            data-has-h1="${p.has_h1}"
            data-slow="${p.load_time_ms > 3000}"
            data-js-dep="${p.js_dependent || false}"
            data-redirect="${p.is_redirect || false}"
          >
            <td title="${p.url}">${p.url}</td>
            <td><span class="badge ${p.status_code === 200 ? 'badge-green' : 'badge-red'}">${p.status_code || 'ERR'}</span></td>
            <td>${indexBadge}</td>
            <td>${p.has_title ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-red">No</span>'}</td>
            <td>${p.has_meta_description ? '<span class="badge badge-green">Yes</span>' : '<span class="badge badge-red">No</span>'}</td>
            <td>${p.has_h1 ? `<span class="badge ${p.h1_count > 1 ? 'badge-yellow' : 'badge-green'}">${p.h1_count}</span>` : '<span class="badge badge-red">0</span>'}</td>
            <td>${p.images_missing_alt > 0 ? `<span class="badge badge-yellow">${p.images_missing_alt}</span>` : '<span class="badge badge-green">0</span>'}</td>
            <td>${p.word_count < 200 ? `<span class="badge badge-yellow">${p.word_count}</span>` : p.word_count}</td>
            <td>${loadDisplay}</td>
            <td>${p.crawl_depth !== undefined ? p.crawl_depth : '-'}</td>
            <td>${ogBadge}</td>
            <td>${schemaBadge}</td>
            <td>${redirectBadge}</td>
          </tr>`;
      }).join('');

      // Technical setup block
      const robotsTxt = meta.robots_txt_exists
        ? `<span class="tech-ok">&#10003; found</span>${meta.robots_disallows?.length ? `<span class="tech-detail">(${meta.robots_disallows.length} disallow rules)</span>` : ''}`
        : `<span class="tech-bad">&#10007; not found</span>`;
      const sitemapInfo = meta.sitemap_exists
        ? `<span class="tech-ok">&#10003; found</span>${meta.sitemap_urls?.length ? `<span class="tech-detail">(${meta.sitemap_urls.length} sample URLs)</span>` : ''}`
        : `<span class="tech-bad">&#10007; not found</span>`;

      document.getElementById('report').innerHTML = `
        <div class="stat-grid">
          <div class="stat-box"><div class="value">${data.pages_crawled || 0}</div><div class="label">Pages Crawled</div></div>
          <div class="stat-box ok"><div class="value">${data.indexable_pages || 0}</div><div class="label">Indexable Pages</div></div>
          <div class="stat-box ${data.non_indexable_pages > 0 ? '' : 'ok'}">
            <div class="value">${data.non_indexable_pages || 0}</div><div class="label">Non-Indexable</div>
          </div>
          <div class="stat-box ${totalIssues > 10 ? '' : totalIssues > 0 ? 'warn' : 'ok'}">
            <div class="value">${totalIssues}</div><div class="label">Total Issues</div>
          </div>
          <div class="stat-box ${cov.avg_word_count < 200 ? '' : 'ok'}">
            <div class="value">${cov.avg_word_count || 0}</div><div class="label">Avg Word Count</div>
          </div>
          <div class="stat-box ${data.error_pages > 0 ? '' : 'ok'}">
            <div class="value">${data.error_pages || 0}</div><div class="label">Error Pages</div>
          </div>
          <div class="stat-box ${scoreCls}">
            <div class="value">${score}</div><div class="label">SEO Score</div>
          </div>
        </div>

        <h2>Technical Setup</h2>
        <div class="tech-setup">
          <div class="tech-setup-item">
            <span class="tech-label">robots.txt:</span> ${robotsTxt}
          </div>
          <div class="tech-setup-item">
            <span class="tech-label">sitemap.xml:</span> ${sitemapInfo}
          </div>
        </div>

        <h2>Indexability</h2>
        <ul class="issue-list">
          ${issueBlock('noindex', `Noindex pages: ${noindexCount}`, noindexCount > 0 ? '' : 'ok', noindexCount, idx.noindex?.urls)}
          ${issueBlock('canonaway', `Canonicalized away: ${canonAwayCount} pages`, canonAwayCount > 0 ? '' : 'ok', canonAwayCount, idx.canonicalized_away?.urls)}
        </ul>

        <h2>SEO</h2>
        <ul class="issue-list">
          ${issueBlock('title', `Missing title: ${missingTitle} pages`, missingTitle > 0 ? 'critical' : 'ok', missingTitle, issues.missing_title?.urls)}
          ${issueBlock('meta', `Missing meta description: ${missingMeta} pages`, missingMeta > 0 ? (missingMeta > 5 ? 'critical' : '') : 'ok', missingMeta, issues.missing_meta_description?.urls)}
          ${issueBlock('h1', `Missing H1: ${missingH1} pages`, missingH1 > 0 ? (missingH1 > 3 ? 'critical' : '') : 'ok', missingH1, issues.missing_h1?.urls)}
          ${issueBlock('multih1', `Multiple H1 tags: ${multipleH1} pages`, multipleH1 > 0 ? '' : 'ok', multipleH1, issues.multiple_h1?.urls)}
          ${issueBlock('canon', `Missing canonical: ${missingCanon} pages`, missingCanon > 0 ? '' : 'ok', missingCanon, issues.missing_canonical?.urls)}
          ${issueBlock('duptitles', `Duplicate titles: ${dupTitles} pages`, dupTitles > 0 ? '' : 'ok', dupTitles, issues.duplicate_titles?.urls)}
          ${issueBlock('titletoolong', `Title too long (&gt;60 chars): ${titleTooLong} pages`, titleTooLong > 0 ? '' : 'ok', titleTooLong, issues.title_too_long?.urls)}
          ${issueBlock('titlestooshort', `Title too short (&lt;10 chars): ${titleTooShort} pages`, titleTooShort > 0 ? '' : 'ok', titleTooShort, issues.title_too_short?.urls)}
          ${issueBlock('metatoolong', `Meta description too long (&gt;160 chars): ${metaTooLong} pages`, metaTooLong > 0 ? '' : 'ok', metaTooLong, issues.meta_description_too_long?.urls)}
          ${issueBlock('metatooshort', `Meta description too short (&lt;70 chars): ${metaTooShort} pages`, metaTooShort > 0 ? '' : 'ok', metaTooShort, issues.meta_description_too_short?.urls)}
          ${issueBlock('dupmeta', `Duplicate meta descriptions: ${dupMeta} pages`, dupMeta > 0 ? '' : 'ok', dupMeta, issues.duplicate_meta_descriptions?.urls)}
        </ul>

        <h2>Accessibility</h2>
        <ul class="issue-list">
          ${issueBlock('lang', `Missing HTML lang attribute: ${missingLang} pages`, missingLang > 0 ? 'critical' : 'ok', missingLang, issues.missing_html_lang?.urls)}
          ${issueBlock('alt', `Missing alt tags: ${missingAlt} images across ${(issues.missing_alt_tags?.pages || []).length} pages`, missingAlt > 0 ? '' : 'ok', missingAlt, issues.missing_alt_tags?.pages)}
          ${issueBlock('btn', `Buttons without label: ${missingBtn} across ${(issues.buttons_missing_label?.pages || []).length} pages`, missingBtn > 0 ? '' : 'ok', missingBtn, issues.buttons_missing_label?.pages)}
        </ul>

        <h2>Content &amp; Technical</h2>
        <ul class="issue-list">
          ${issueBlock('thin', `Thin content (&lt;200 words): ${thinContent} pages (${cov.pct_thin_content || 0}%)`, thinContent > 0 ? '' : 'ok', thinContent, issues.thin_content_under_200_words?.urls)}
          ${issueBlock('empty', `Empty pages: ${emptyPages}`, emptyPages > 0 ? 'critical' : 'ok', emptyPages, issues.empty_pages?.urls)}
          ${issueBlock('broken', `Broken images: ${brokenImg}`, brokenImg > 0 ? 'critical' : 'ok', brokenImg, issues.broken_images?.pages)}
          ${issueBlock('non200', `Non-200 status: ${non200} pages`, non200 > 0 ? 'critical' : 'ok', non200, issues.non_200_status?.pages)}
        </ul>

        <h2>Performance</h2>
        <ul class="issue-list">
          ${issueBlock('slowpages', `Slow pages (&gt;3s): ${slowPgs} pages`, slowPgs > 0 ? '' : 'ok', slowPgs, issues.slow_pages?.urls)}
          ${issueBlock('avgload', `Average load time: ${avgLoad} ms`, avgLoad > 3000 ? '' : avgLoad > 1500 ? 'warn' : 'ok', 0, [])}
          ${issueBlock('deeppages', `Deep pages (&gt;3 clicks from home): ${deepPgs} pages`, deepPgs > 0 ? '' : 'ok', deepPgs, issues.deep_pages?.urls)}
          ${issueBlock('redirects', `Redirect pages: ${redirectPgs} pages`, redirectPgs > 0 ? '' : 'ok', redirectPgs, issues.redirect_pages?.urls)}
          ${issueBlock('jsdep', `JS-dependent pages: ${jsDep} pages`, jsDep > 0 ? '' : 'ok', jsDep, issues.js_dependent_pages?.urls)}
        </ul>

        <h2>Open Graph &amp; Schema</h2>
        <ul class="issue-list">
          ${issueBlock('missingog', `Missing OG title or image: ${missingOg} pages`, missingOg > 0 ? '' : 'ok', missingOg, issues.missing_og?.urls)}
          ${issueBlock('missingschema', `Missing structured data (Schema.org): ${missingSchema} pages`, missingSchema > 0 ? '' : 'ok', missingSchema, issues.missing_schema?.urls)}
        </ul>

        <h2>URL Quality</h2>
        <ul class="issue-list">
          ${issueBlock('urlissues', `URL issues (uppercase / underscores / too long): ${urlIssues} pages`, urlIssues > 0 ? '' : 'ok', urlIssues, issues.url_issues?.urls)}
        </ul>

        ${data.ai_summary ? `<h2>AI Summary</h2><div class="ai-summary">${data.ai_summary}</div>` : ''}

        <details>
          <summary>Page Details (${(data.page_details || []).length} pages)</summary>
          <div class="table-filter-row">
            <input type="text" id="tableSearch" placeholder="Filter URLs..." oninput="applyTableFilters()" />
            <select id="tableFilter" onchange="applyTableFilters()">
              <option value="">All pages</option>
              <option value="indexable">Indexable</option>
              <option value="not-indexable">Not indexable</option>
              <option value="no-title">Missing title</option>
              <option value="no-meta">Missing meta</option>
              <option value="no-h1">Missing H1</option>
              <option value="slow">Slow (&gt;3s)</option>
              <option value="js-dependent">JS dependent</option>
              <option value="redirect">Redirect</option>
            </select>
          </div>
          <table>
            <thead>
              <tr>
                <th>URL</th><th>Status</th><th>Indexable</th><th>Title</th><th>Meta</th>
                <th>H1</th><th>No Alt</th><th>Words</th><th>Load (ms)</th><th>Depth</th>
                <th>OG</th><th>Schema</th><th>Redirect</th>
              </tr>
            </thead>
            <tbody id="pageDetailsBody">${pageRows}</tbody>
          </table>
        </details>
      `;
      document.getElementById('report').style.display = 'block';
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function showProgress(show) {
      document.getElementById('progressWrap').style.display = show ? 'block' : 'none';
      if (!show) document.getElementById('progressBar').style.width = '0%';
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') startAnalysis();
    });
  </script>
</body>
</html>
